[build]
  command = "npm_config_node_version=22 npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/sw.js"
  to = "/404"
  status = 404

[[headers]]
  for = "/sw.js"
  [headers.values]
    Service-Worker-Allowed = "/"
